
<section class="bg-gray-50 font-sans">

    <header class="bg-[#22c55e] text-white py-8 px-6 md:px-12">
        <nav class="text-s  text-gray-900 mb-6">
              <button routerLink="/home" routerLinkActive="text-white" >Home</button> /  <button routerLinkActive="text-white" routerLink="/categories">Categories</button> / <button   class="text-white"> {{category().name}}</button>
            </nav>
        <div class="max-w-7xl mx-auto flex items-center gap-4">
            
            <div class="bg-white/20 p-1 rounded-xl backdrop-blur-sm border border-white/30 shadow-sm">
                <img [src]="category().image" 
                     alt="Women's Fashion" class="w-14 h-14 rounded-lg object-cover">
            </div>
            <div>
                <h1 class="text-3xl font-bold tracking-tight">{{category().name}}</h1>
                <p class="text-sm opacity-90 mt-0.5">Choose a subcategory to browse products</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <a routerLink="/categories" class="flex items-center gap-2 text-[#4b5563] hover:text-[#111827] text-sm font-medium transition-colors mb-6">
            <i class="fa-solid fa-arrow-left text-xs"></i>
            Back to Categories
        </a>

        <h2 class="text-xl font-bold text-[#111827] mb-8">
            {{categoriesdetails().length}} Subcategories in {{category().name}}
        </h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            
           @for (categor of categoriesdetails(); track categor._id) {
             <div  [routerLink]="['/subcategories', categor._id , categor.name]" class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center mb-6">
                    <i class="fa-solid fa-folder text-primary text-xl"></i>
                </div>
                <span class="text-lg font-bold text-[#111827]">{{categor.name}}</span>
            </div>
           }

        </div>
            
    </main>

</section>
