
<section class="bg-gray-50 font-sans">

    <header class="bg-linear-to-r from-[#a855f7] to-[#8b5cf6] text-white pt-12 pb-20 px-6 md:px-16">
        <div class="max-w-7xl mx-auto">
            <nav class="text-s  text-gray-900 mb-6">
              <button routerLink="/home" routerLinkActive="text-white" >Home</button> / <button  routerLink="/brand" routerLinkActive="text-white">Brands</button>
            </nav>

            <div class="flex items-center gap-5">
                <div class="bg-white/20 p-4 rounded-2xl shadow-inner backdrop-blur-sm border border-white/30">
                    <i class="fa-solid fa-tags text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Top Brands</h1>
                    <p class="text-sm opacity-90 mt-1">Shop from your favorite brands</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 mt-10 pb-12">
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6">
            
           @for (brand of BrandsList(); track brand._id) {

             <div   [routerLink]="['/brand', brand._id]"
 class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm hover:shadow-md transition-shadow cursor-pointer flex flex-col items-center group">
                <div class="w-full aspect-square bg-gray-50/50 rounded-xl flex items-center justify-center p-6 mb-4">
                    <img [src]="brand.image" class="text-xl font-black text-gray-800 tracking-tighter uppercase italic group-hover:scale-105 transition-transform"/>
                </div>
                <span class="text-sm font-medium text-gray-600">{{brand.name}}</span>
            </div>
           }


        </div>
    </main>

</section>
