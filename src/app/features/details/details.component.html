

<section class="p-4 md:p-8">
  <div class="container max-w-6xl">
    <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_minmax(0,2fr)] gap-12">
      <div class="space-y-4">
        <div class="bg-gray-50 rounded-2xl overflow-hidden border border-gray-100 shadow-sm">
          <img
          [src]="productDetails().imageCover"
            alt="Main Product"
            class="w-full object-cover"
          />
        </div>
      </div>

      <div class="flex flex-col gap-6">
        <div class="space-y-3">
          <div class="flex gap-2">
            <span
              class="bg-emerald-50 text-emerald-600 text-xs px-2.5 py-1 rounded-full font-medium"
              >{{productDetails().category}}</span
            >
            <span class="bg-gray-100 text-gray-600 text-xs px-2.5 py-1 rounded-full font-medium"
              >{{productDetails().brand.name}}</span
            >
          </div>

          <h1 class="text-3xl md:text-4xl font-bold text-slate-900">{{productDetails().title}}</h1>
          <div class="flex items-center gap-2">
            <div class="flex text-yellow-400 text-sm gap-0.5">
              <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i
              ><i class="fas fa-star"></i><i class="far fa-star text-gray-300"></i>
            </div>
            <span class="text-sm text-gray-500 font-medium">{{productDetails().ratingsAverage}} ({{productDetails().ratingsQuantity}} reviews)</span>
          </div>

          <p class="text-2xl font-bold text-slate-900"> {{productDetails().price | currency: 'GBP'}}</p>
          <span
            class="inline-flex items-center gap-1.5 text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full"
          >
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span> In Stock
          </span>
        </div>

        <p class="text-sm text-gray-500 leading-relaxed max-w-md">
{{productDetails().description}}        </p>

       

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-2">
          <button
            class="w-full cursor-pointer bg-emerald-600 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-700 transition-all flex items-center justify-center gap-2 shadow-lg shadow-emerald-100"
          >
            <i class="fas fa-shopping-cart"></i> Add to Cart
          </button>
          <button
            class="f border cursor-pointer border-gray-200 py-3 rounded-xl font-bold text-gray-700 hover:bg-gray-50 transition-all"
          >
            <i class="far fa-heart"></i> Add to Wishlist
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
